# 3. Fill out the Forwarding Email Form
- tapOn: "Email"
- inputText: "ldeevi+qatest2_10@reputation.com"
- waitForAnimationToEnd
- tapOn: 
    id: "subject" # Using the ID you verified in your screenshot
